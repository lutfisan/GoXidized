hostname xr-core-1
username backup
 group root-system
 secret 10 xrUserSecret
!
snmp-server community xrPublic RO
radius-server host 192.0.2.30 auth-port 1812 acct-port 1813 key 7 xrRadiusKey
router ospf CORE
 area 0
  interface Bundle-Ether1
   authentication-key xrOspfKey
!
interface Bundle-Ether1
 description core uplink
 ipv4 address 192.0.2.3 255.255.255.0
!
